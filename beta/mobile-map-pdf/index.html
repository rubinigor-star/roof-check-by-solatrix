<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Solatrix Roof Check Beta</title>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--ink:#101820;--muted:#6d6258;--line:#eadbc7;--navy:#071b2f;--navy2:#102b46;--gold:#f5a11a;--gold2:#ffbf54;--green:#25D366;--shadow:0 26px 70px rgba(28,20,12,.14);--blue:#0b6fff}*{box-sizing:border-box}html{direction:rtl}body{margin:0;font-family:Assistant,Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 8% 10%,rgba(255,191,84,.34),transparent 28%),radial-gradient(circle at 92% 18%,rgba(7,27,47,.10),transparent 26%),linear-gradient(135deg,#fff9ef,#fff1d9);min-height:100vh;overflow-x:hidden}button,input{font-family:inherit}button{cursor:pointer}.siteHeader{position:sticky;top:0;z-index:20;background:rgba(255,250,241,.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(36,26,16,.08)}.headerInner{width:min(1080px,calc(100% - 28px));min-height:78px;margin:auto;display:flex;align-items:center;justify-content:space-between}.logoImage{width:168px;height:auto;display:block}.headerCta{display:inline-flex;text-decoration:none;background:var(--green);color:#fff;border-radius:999px;padding:11px 17px;font-weight:950}.appShell{width:min(1080px,calc(100% - 28px));margin:auto;padding:24px 0 48px}.screen{min-height:calc(100vh - 150px);display:grid;place-items:center;position:relative}.card{width:100%;background:rgba(255,255,255,.93);border:1px solid rgba(45,32,20,.08);box-shadow:var(--shadow);border-radius:34px;padding:30px;position:relative;overflow:hidden}.card:before{content:"";position:absolute;inset:0 0 auto;height:7px;background:linear-gradient(90deg,var(--gold),var(--gold2),#fff0bd)}.card>*{position:relative;z-index:2}.centerCard,.focusCard{max-width:720px;text-align:center}.heroGrid{width:100%;display:grid;gap:18px}.heroCard{min-height:460px;display:flex;flex-direction:column;justify-content:center;align-items:center}.eyebrow{display:inline-flex;align-items:center;gap:10px;margin-bottom:18px;color:rgba(45,32,20,.55);font-size:13px;font-weight:950;text-transform:uppercase;letter-spacing:.08em;direction:ltr}.eyebrow:before{content:"";width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 8px rgba(245,161,26,.13)}.screenIcon{width:54px;height:54px;margin:0 auto 14px;border-radius:20px;background:#fff4d7;display:grid;place-items:center;font-size:27px;box-shadow:inset 0 0 0 1px rgba(245,161,26,.22),0 14px 28px rgba(245,161,26,.16)}h1,h2{margin:0;font-weight:950;letter-spacing:-.055em}h1{font-size:clamp(54px,13vw,92px);line-height:.9;margin-bottom:26px}h2{font-size:clamp(36px,9vw,62px);line-height:.95;margin-bottom:22px;text-align:center}.heroText,.subText{margin:-12px auto 26px;max-width:560px;color:var(--muted);font-size:19px;line-height:1.45;font-weight:700}.featureChips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin:-10px 0 24px}.featureChips span{background:#fff7e8;border:1px solid #f0d7af;border-radius:999px;padding:9px 13px;font-size:14px;font-weight:950;color:#72501d}.primaryBtn,.ghostBtn,.nextTextBtn{min-height:58px;border:0;border-radius:999px;padding:15px 24px;font-size:18px;font-weight:950;display:inline-flex;align-items:center;justify-content:center;text-decoration:none}.primaryBtn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#17120d;box-shadow:0 16px 32px rgba(245,161,26,.28)}.primaryBtn.large{min-height:68px;font-size:22px;width:100%;max-width:460px}.ghostBtn{background:#fff;border:1px solid var(--line);color:#1b140e}.nextTextBtn{width:100%;background:var(--navy);color:white;margin-top:12px}.nextTextBtn:disabled{opacity:.35}.actions{display:grid;grid-template-columns:1fr;gap:12px;margin-top:22px}.progressDots{display:flex;gap:7px;justify-content:center;margin-bottom:30px;direction:ltr}.progressDots span{width:9px;height:9px;border-radius:50%;background:#dfd0bc}.progressDots span.done{background:var(--gold);box-shadow:0 0 0 5px rgba(245,161,26,.16)}.fieldGroup{display:grid;gap:7px;margin-bottom:12px;text-align:right}.fieldGroup label{font-weight:950;color:var(--navy);font-size:15px}input{width:100%;border:1px solid var(--line);background:#fffaf2;border-radius:22px;padding:18px 20px;font-size:20px;font-weight:750;color:var(--ink);outline:none}.roofOptions{display:grid;gap:12px}.roofOption{width:100%;min-height:82px;border:1px solid var(--line);background:#fffaf2;border-radius:24px;padding:16px 18px;font-weight:950;color:var(--ink);display:grid;grid-template-columns:52px 1fr;align-items:center;gap:12px;text-align:right}.roofOption span{grid-row:1/3;width:44px;height:44px;border-radius:15px;background:white;display:grid;place-items:center;color:var(--gold)}.roofOption b{font-size:21px}.roofOption small{font-size:13px;color:var(--muted);font-weight:900}.roofOption.selected{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:var(--gold)}.mapScreen{place-items:stretch}.mapCard{display:grid;gap:18px}.mapPanel{position:relative;height:52vh;min-height:420px;background:#e8ddd0;border-radius:28px;overflow:hidden;direction:ltr;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}#roofMap{position:absolute;inset:0;z-index:1}.mapToolbar{position:absolute;right:14px;top:14px;z-index:5;display:flex;gap:8px;flex-wrap:wrap;direction:rtl}.mapToolbar button{border:0;border-radius:999px;padding:10px 13px;background:#fff;color:#241a10;font-weight:950;box-shadow:0 10px 24px rgba(25,18,10,.12)}.mapToolbar .primary{background:linear-gradient(135deg,var(--gold),var(--gold2))}.mapHint{position:absolute;right:14px;left:14px;bottom:14px;z-index:5;background:rgba(255,255,255,.94);border-radius:18px;padding:11px 14px;font-weight:900;color:var(--navy);box-shadow:0 12px 28px rgba(0,0,0,.14);direction:rtl}.mapHint.ok{background:rgba(232,251,242,.95);color:#16734a}.roofDot{width:9px!important;height:9px!important;border-radius:50%;background:var(--blue);border:2px solid white;box-shadow:0 0 0 2px rgba(11,111,255,.35),0 4px 12px rgba(0,0,0,.25)}.markStatus{text-align:center;background:#eaf7ff;border:1px solid rgba(11,111,255,.18);border-radius:18px;padding:13px;font-weight:950;color:#145ea8}.obstacleGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.obstacle{border:1px solid var(--line);background:#fffaf2;border-radius:20px;padding:14px;font-weight:950;color:var(--navy)}.obstacle.selected{background:#fff4d7;border-color:var(--gold)}.analysisCard{min-height:360px;display:grid;place-items:center;align-content:center;gap:18px}.loader{width:74px;height:74px;border-radius:50%;border:8px solid #f4dfbc;border-top-color:var(--gold);animation:spin .85s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.reportCard{max-width:980px}.reportHeroGraphic{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:center;background:linear-gradient(135deg,#071b2f,#123a5c);color:white;border-radius:24px;padding:18px 20px;margin:12px 0 22px}.reportHeroGraphic strong{display:block;font-size:34px;line-height:1;direction:ltr}.reportHeroGraphic span{font-weight:900;color:#ffdf9f}.resultsGrid{display:grid;grid-template-columns:1fr;gap:12px;margin:24px 0}.resultsGrid div{background:#fffaf2;border:1px solid var(--line);border-radius:22px;padding:18px}.resultsGrid span{display:block;color:var(--muted);font-size:14px;font-weight:900;margin-bottom:8px}.resultsGrid b{display:block;color:var(--navy);font-size:27px;font-weight:950;direction:ltr;text-align:right}.leadFields{display:grid;gap:10px;margin:18px 0}.successToast{margin-top:14px;background:#eef8f2;border:1px solid #cbe8d8;border-radius:18px;padding:13px;color:#1e7549;font-weight:950;text-align:center}@media(max-width:560px){.headerInner{width:calc(100% - 22px);min-height:72px}.logoImage{width:142px}.headerCta{padding:10px 13px;font-size:14px}.appShell{width:calc(100% - 22px);padding-top:14px}.card{padding:20px;border-radius:28px}.heroCard{min-height:410px}h1{font-size:56px}h2{font-size:38px}.heroText,.subText{font-size:16px}.mapPanel{height:62vh;min-height:430px;border-radius:22px}.mapToolbar{left:10px;right:10px;top:10px}.mapToolbar button{padding:9px 10px;font-size:14px}.mapHint{font-size:14px;right:10px;left:10px;bottom:10px}.obstacleGrid{grid-template-columns:1fr}.reportHeroGraphic{grid-template-columns:1fr}.primaryBtn.large{font-size:19px}.featureChips span{font-size:12px}}@media(min-width:760px){.actions,.leadFields{grid-template-columns:1fr 1fr}.resultsGrid{grid-template-columns:repeat(2,1fr)}}@media(min-width:980px){.resultsGrid{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CONFIG={productionPerKw:1650,buyRate:.64,sellRate:.48,installCostPerKw:2900,sqmPerKw:7,panelKw:.63,usableRoofFactor:.82,defaultPhone:'972547299727'};
const LOGO_SRC='https://static.wixstatic.com/media/e34422_f461fb2e8382455e8d0d7ba9d71eca1e~mv2.png/v1/fill/w_298,h_194,al_c,q_90,enc_avif,quality_auto/Solatrix%20Logo%20Sait%20Main.png';
const state={step:0,address:'',monthlyBill:850,roofType:'',leadName:'',leadPhone:'',points:[],surfaces:[],obstacles:[],drawing:false,leadSent:false,map:null,layer:null};
function fmt(n){return Math.round(Number(n)||0).toLocaleString('he-IL')}function money(n){return '₪'+fmt(n)}
function progress(){return state.step===0?'':`<div class="progressDots">${[1,2,3,4,5,6].map(i=>`<span class="${i<=state.step?'done':''}"></span>`).join('')}</div>`}
function header(){return `<header class="siteHeader"><div class="headerInner"><img class="logoImage" src="${LOGO_SRC}"><a class="headerCta" href="https://wa.me/${CONFIG.defaultPhone}" target="_blank">WhatsApp</a></div></header>`}
function actions(t){return `<div class="actions"><button class="primaryBtn" data-action="next">${t}</button>${state.step>1?'<button class="ghostBtn" data-action="prev">חזרה</button>':''}</div>`}
function calc(){const roofArea=state.surfaces.reduce((s,x)=>s+x.area,0);const usableArea=roofArea*CONFIG.usableRoofFactor;const systemKw=usableArea/CONFIG.sqmPerKw;const annualProduction=systemKw*CONFIG.productionPerKw*dirFactor();const annualConsumption=(Number(state.monthlyBill||0)*12)/CONFIG.buyRate;const self=Math.min(annualProduction*.45,annualConsumption);const exported=Math.max(annualProduction-self,0);const annualSavings=self*CONFIG.buyRate+exported*CONFIG.sellRate;const cost=systemKw*CONFIG.installCostPerKw;const payback=cost/Math.max(annualSavings,1);const profit25=annualSavings*25-cost;const panels=Math.max(Math.floor(systemKw/CONFIG.panelKw),1);return{roofArea,usableArea,systemKw,annualProduction,annualSavings,cost,payback,profit25,panels,self,exported}}
function dir(){if(!state.surfaces.length)return'לא נקבע';return state.surfaces[0].direction||'דרום'}function dirFactor(){const d=dir();return d==='דרום'?1:d==='מזרח'?0.88:d==='מערב'?0.84:d==='דרום-מזרח'||d==='דרום-מערב'?0.94:0.72}
function estimateDirection(latlngs){if(latlngs.length<2)return'דרום';let a=0;for(let i=0;i<latlngs.length;i++){const p=latlngs[i],q=latlngs[(i+1)%latlngs.length];a+=Math.atan2(q.lng-p.lng,q.lat-p.lat)}const deg=((a/latlngs.length*180/Math.PI)%360+360)%360;if(deg<45||deg>315)return'דרום';if(deg<135)return'מזרח';if(deg<225)return'צפון';return'מערב'}
function areaM2(latlngs){if(latlngs.length<3)return 0;const R=6378137,lat0=latlngs.reduce((s,p)=>s+p.lat,0)/latlngs.length*Math.PI/180;const pts=latlngs.map(p=>({x:R*p.lng*Math.PI/180*Math.cos(lat0),y:R*p.lat*Math.PI/180}));let sum=0;pts.forEach((p,i)=>{const n=pts[(i+1)%pts.length];sum+=p.x*n.y-n.x*p.y});return Math.abs(sum/2)}
function center(){const a=(state.address||'').toLowerCase();if(a.includes('תל')||a.includes('tel'))return[32.0853,34.7818];if(a.includes('ירושלים')||a.includes('jerusalem'))return[31.778,35.225];if(a.includes('באר')||a.includes('beer'))return[31.2529,34.7915];return[32.7937,34.9892]}
function hero(){return `<section class="screen"><div class="card centerCard heroCard"><div class="eyebrow">Roof Check by Solatrix</div><h1>בדיקת גג סולארית</h1><p class="heroText">תוך דקה מקבלים הערכה ראשונית: שטח שימושי, כמות פאנלים, ייצור שנתי ורווח צפוי.</p><div class="featureChips"><span>☀️ חישוב מהיר</span><span>📍 לפי כתובת</span><span>📄 דוח PDF מלא</span></div><button class="primaryBtn large" data-action="next">התחילו בדיקת גג</button></div></section>`}
function address(){return `<section class="screen"><div class="card focusCard">${progress()}<div class="screenIcon">📍</div><h2>כתובת וחשבון חשמל</h2><p class="subText">החשבון החודשי עוזר לחשב כמה מהייצור יחסוך וכמה יימכר לרשת.</p><div class="fieldGroup"><label>כתובת הגג</label><input value="${state.address}" placeholder="לדוגמה: החרמון 10, חיפה" data-field="address"></div><div class="fieldGroup"><label>חשבון חשמל חודשי משוער</label><input value="${state.monthlyBill}" inputmode="numeric" data-field="monthlyBill"></div>${actions('מצא את הגג')}</div></section>`}
function roofType(){return `<section class="screen"><div class="card focusCard">${progress()}<div class="screenIcon">🏠</div><h2>איזה סוג גג?</h2><div class="roofOptions">${[['flat','▰','גג שטוח','הכי פשוט לסימון מהיר'],['sloped','◭','גג לא אחיד / כמה צדדים','נסמן כל צד בנפרד'],['commercial','▦','גג מסחרי','שטח גדול, פוטנציאל גבוה']].map(x=>`<button class="roofOption ${state.roofType===x[0]?'selected':''}" data-action="roof:${x[0]}"><span>${x[1]}</span><b>${x[2]}</b><small>${x[3]}</small></button>`).join('')}</div>${actions('המשך לסימון')}</div></section>`}
function mapScreen(){return `<section class="screen mapScreen"><div class="card mapCard">${progress()}<div class="screenIcon">✏️</div><h2>${state.roofType==='sloped'?'סמנו כל צד של הגג':'סמנו את שטח הגג'}</h2><div class="mapPanel"><div id="roofMap"></div><div class="mapToolbar"><button class="primary" data-action="startDraw">התחל סימון</button><button data-action="undoPoint">בטל נקודה</button><button data-action="clearMap">נקה הכל</button></div><div class="mapHint" id="mapHint">קרבו את המפה. לחצו “התחל סימון” וסמנו את פינות הגג. אחרי 3 נקודות אפשר להמשיך.</div></div><div class="markStatus" id="status">${state.surfaces.length?`סומנו ${state.surfaces.length} שטחים — ${fmt(calc().roofArea)} מ״ר`:'עדיין לא סומן שטח גג.'}</div><div class="actions"><button class="nextTextBtn" data-action="next" ${state.points.length<3&&!state.surfaces.length?'disabled':''}>סיימתי</button><button class="ghostBtn" data-action="prev">חזרה</button></div></div></section>`}
function obstacles(){const items=[['ac','מזגן','❄️'],['boiler','דוד','💧'],['shade','צל','🌳'],['access','יציאה לגג','🚪'],['solar','קולטים קיימים','☀️']];return `<section class="screen mapScreen"><div class="card mapCard">${progress()}<div class="screenIcon">🧩</div><h2>מה נמצא על הגג?</h2><div class="obstacleGrid">${items.map(x=>`<button class="obstacle ${state.obstacles.includes(x[0])?'selected':''}" data-action="obstacle:${x[0]}"><span>${x[2]}</span> ${x[1]}</button>`).join('')}</div>${actions('המשך')}</div></section>`}
function analysis(){return `<section class="screen"><div class="card centerCard analysisCard"><div class="loader"></div><h2>מנתחים את הגג...</h2><p class="subText">בודקים שטח שימושי, כיוון שמש, צריכה עצמית, מכירה לרשת והחזר השקעה.</p></div></section>`}
function report(){const r=calc();return `<section class="screen reportScreen"><div class="card reportCard"><div class="eyebrow">דוח סולארי ראשוני</div><h2>הגג מתאים למערכת של כ-${r.systemKw.toFixed(1)} kW</h2><div class="reportHeroGraphic"><div><strong>${money(r.annualSavings)}</strong><span>חיסכון/הכנסה שנתית משוערת</span></div><div><b>☀️</b><br><span>כיוון שמש משוער: ${dir()}</span></div></div><div class="resultsGrid"><div><span>שטח גג</span><b>${fmt(r.roofArea)} m²</b></div><div><span>שטח שימושי</span><b>${fmt(r.usableArea)} m²</b></div><div><span>פאנלים</span><b>${r.panels}</b></div><div><span>ייצור שנתי</span><b>${fmt(r.annualProduction)} kWh</b></div><div><span>חיסכון/הכנסה שנתית</span><b>${money(r.annualSavings)}</b></div><div><span>החזר השקעה</span><b>${r.payback.toFixed(1)} שנים</b></div><div><span>רווח 25 שנים</span><b>${money(r.profit25)}</b></div></div><div class="leadFields"><input placeholder="שם מלא" value="${state.leadName}" data-field="leadName"><input placeholder="טלפון WhatsApp" value="${state.leadPhone}" data-field="leadPhone"></div><button class="primaryBtn large" data-action="pdf">קבלו דוח PDF מלא</button>${state.leadSent?'<div class="successToast">הדוח נפתח.</div>':''}</div></section>`}
function render(){document.getElementById('root').innerHTML=header()+`<main class="appShell">${[hero,address,roofType,mapScreen,obstacles,analysis,report][state.step]()}</main>`;document.querySelectorAll('[data-action]').forEach(el=>el.onclick=e=>{e.preventDefault();handle(el.dataset.action)});document.querySelectorAll('[data-field]').forEach(el=>el.oninput=()=>state[el.dataset.field]=el.value);if(state.step===3)setTimeout(initMap,50)}
function handle(a){if(a==='next'){if(state.step===3&&state.points.length>=3)savePoly();state.step=Math.min(6,state.step+1);render();if(state.step===5)setTimeout(()=>{state.step=6;render()},900)}else if(a==='prev'){state.step=Math.max(0,state.step-1);render()}else if(a.startsWith('roof:')){state.roofType=a.split(':')[1];render()}else if(a.startsWith('obstacle:')){const v=a.split(':')[1];state.obstacles=state.obstacles.includes(v)?state.obstacles.filter(x=>x!==v):[...state.obstacles,v];render()}else if(a==='startDraw'){state.drawing=true;msg('מצב סימון פעיל: סמנו את פינות הגג. אחרי 3 נקודות אפשר להמשיך.')}else if(a==='undoPoint'){state.points.pop();draw();status()}else if(a==='clearMap'){state.points=[];state.surfaces=[];draw();status()}else if(a==='pdf'){makePdf()}}
function initMap(){if(!window.L)return msg('Leaflet לא נטען. בדקו חיבור אינטרנט.');state.map=L.map('roofMap',{maxZoom:20}).setView(center(),18);L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,attribution:'Imagery © Esri'}).addTo(state.map);state.layer=L.layerGroup().addTo(state.map);state.map.on('click',e=>{if(!state.drawing)return;state.points.push(e.latlng);draw();status()});draw();setTimeout(()=>state.map.invalidateSize(),200)}
function draw(){if(!state.layer)return;state.layer.clearLayers();state.surfaces.forEach(s=>drawPoly(s.latlngs,true));if(state.points.length)drawPoly(state.points,state.points.length>=3)}function drawPoly(pts,closed){if(closed)L.polygon(pts,{color:'#0b6fff',weight:2,fillColor:'#0b6fff',fillOpacity:.28}).addTo(state.layer);else if(pts.length>1)L.polyline(pts,{color:'#0b6fff',weight:2,dashArray:'5,5'}).addTo(state.layer);pts.forEach(p=>L.marker(p,{icon:L.divIcon({className:'roofDot',html:'',iconSize:[9,9],iconAnchor:[4,4]})}).addTo(state.layer))}
function status(){const a=state.points.length>=3?areaM2(state.points):0;const t=state.surfaces.reduce((s,x)=>s+x.area,0)+a;document.getElementById('status').textContent=t?`שטח מסומן: ${fmt(t)} מ״ר`:'עדיין לא סומן שטח גג.';document.querySelector('.nextTextBtn')?.toggleAttribute('disabled',!(state.points.length>=3||state.surfaces.length));msg(state.points.length>=3?'השטח נסגר בכחול. אפשר ללחוץ “סיימתי” ולהמשיך.':'סמנו לפחות 3 נקודות.',state.points.length>=3)}
function msg(t,ok=false){const h=document.getElementById('mapHint');if(h){h.textContent=t;h.classList.toggle('ok',ok)}}function savePoly(){state.surfaces.push({area:areaM2(state.points),latlngs:[...state.points],direction:estimateDirection(state.points)});state.points=[];state.drawing=false}
